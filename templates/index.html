<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Bibliotēka</title>
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo">📚 Bibliotēka</a>
            <nav>
                {% if session.u_name %}
                    <span>Sveiki, <b>{{ session.u_name }}</b>!</span>
                    <a href="/logout" style="color:var(--danger); margin-left:15px; text-decoration:none;">Iziet</a>
                {% else %}
                    <a href="/login" class="btn-book">Ienākt</a>
                {% endif %}
            </nav>
        </div>
    </header>
    <main class="container">
        <div class="search-container">
            <h1>Atklāj jaunas pasaules</h1>
            <p style="color:#64748b;">Atrodi savu nākamo grāmatu šeit</p>
            <form method="GET" class="search-form">
                <input name="search" class="search-input" placeholder="Meklēt..." value="{{ request.args.get('search', '') }}">
                <button type="submit" class="btn-search">Meklēt</button>
            </form>
        </div>
        <div class="grid">
            {% for b in books %}
            <div class="card">
                <img src="{{ url_for('static', filename='uploads/' + b.attels) }}" class="card-img" onerror="this.src='https://via.placeholder.com/300x450'">
                <div class="card-body">
                    <div><h3>{{ b.virsraksts }}</h3><p>{{ b.autors }}</p></div>
                    <a href="/book/{{b.id}}" class="btn-book">Lasīt</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </main>
</body>
</html>
