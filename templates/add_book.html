<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Pievienot grāmatu</title>
</head>
<body class="auth-page">
    <div class="auth-card" style="max-width: 600px;">
        <h2>➕ Jauna grāmata</h2>
        <form method="POST" enctype="multipart/form-data" action="/admin/add">
            <label>Nosaukums</label>
            <input name="t" placeholder="Ievadiet nosaukumu..." required>

            <label>Autors</label>
            <input name="a" placeholder="Ievadiet autoru..." required>

            <label>Saturs / Apraksts</label>
            <textarea name="c" placeholder="Grāmatas teksts vai apraksts..." rows="8"></textarea>

            <div style="text-align: left; margin: 15px 0;">
                <label>Vāka attēls</label>
                <input type="file" name="image">
            </div>

            <button type="submit" class="btn-book">Saglabāt grāmatu</button>
        </form>
        <div style="margin-top: 20px;">
            <a href="/admin" style="color: gray; text-decoration: none;">← Atpakaļ uz paneli</a>
        </div>
    </div>
</body>
</html>
