<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Reģistrācija</title>
</head>
<body class="auth-page">
    <div class="auth-card">
        <h2>Reģistrācija</h2>
        {% with msgs = get_flashed_messages() %}
            {% for m in msgs %}<p class="flash-msg">{{m}}</p>{% endfor %}
        {% endwith %}
        <form method="POST">
            <input type="text" name="vards" placeholder="Vārds" required>
            <input type="text" name="uzvards" placeholder="Uzvārds" required>
            <input type="text" name="login" placeholder="Lietotājvārds" required>
            <input type="password" name="parole" placeholder="Parole" required>
            <input type="password" name="parole2" placeholder="Atkārtojiet paroli" required>
            <button type="submit" class="btn-book">Izveidot kontu</button>
        </form>
        <a href="/login">Jau ir konts? Ienākt</a>
    </div>
</body>
</html>
