<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Labot grāmatu</title>
</head>
<body class="auth-page">
    <div class="auth-card" style="max-width: 600px;">
        <h2>Labot grāmatu</h2>
        <form method="POST" enctype="multipart/form-data">
            <label>Nosaukums</label>
            <input type="text" name="t" value="{{ book.virsraksts }}" required>
            <label>Autors</label>
            <input type="text" name="a" value="{{ book.autors }}" required>
            <label>Apraksts / Saturs</label>
            <textarea name="c" rows="8">{{ book.saturs }}</textarea>
            <div style="text-align: left; margin: 15px 0;">
                <label>Vāka attēls (Pašreizējais: {{ book.attels }})</label>
                <input type="file" name="image">
            </div>
            <button type="submit" class="btn-book">Saglabāt izmaiņas</button>
        </form>
        <a href="/admin">Atcelt un atpakaļ</a>
    </div>
</body>
</html>
