<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Admin Ieeja</title>
</head>
<body class="auth-page" style="background: #0f172a;">
    <div class="auth-card" style="background: rgba(30, 41, 59, 0.9); border: 1px solid #334155;">
        <div style="font-size: 50px; margin-bottom: 10px;">🔐</div>
        <h2 style="color: white;">Sistēmas piekļuve</h2>
        {% with msgs = get_flashed_messages() %}
            {% for m in msgs %}<p class="flash-msg">{{m}}</p>{% endfor %}
        {% endwith %}
        <form method="POST">
            <input name="admin_pass" type="password" placeholder="Admina parole" style="background:#334155; color:white; border:none;" required>
            <button type="submit" class="btn-book">Ieiet panelī</button>
        </form>
        <a href="/" style="color: #94a3b8;">← Atpakaļ</a>
    </div>
</body>
</html>
