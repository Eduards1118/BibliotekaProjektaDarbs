<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Ienākt</title>
</head>
<body class="auth-page">
    <div class="auth-card">
        <h2>Ienākt sistēmā</h2>
        {% with msgs = get_flashed_messages() %}
            {% for m in msgs %}<p class="flash-msg">{{m}}</p>{% endfor %}
        {% endwith %}
        <form method="POST">
            <input type="text" name="login" placeholder="Lietotājvārds" required>
            <input type="password" name="parole" placeholder="Parole" required>
            <button type="submit" class="btn-book">Pieslēgties</button>
        </form>
        <a href="/register">Nav konta? Izveidot</a>
    </div>
</body>
</html>
